<!DOCTYPE html>
<html>
<head>
    <title></title>
</head>
<style>
table{
  border-collapse: collapse;
  margin: auto;
}
td {
  width: 60px;
  height: 60px;
  border: 2px solid white;
}
.red {
  background-color: red;
}
.green {
  background-color: green;
}
.blue {
  background-color: blue;
}
.purple {
  background-color: purple;
}
.white {
  background-color: white;
}
</style>
<body>
    <table>
        <tr>
            <td class="white"></td>
            <td class="red" rowspan="6"></td>
            <td class="white" colspan="2"></td>
            <td class="green" colspan="3"></td>
            <td class="white" colspan="2"></td>
            <td class="red" rowspan="6"></td>
            <td class="white"></td>
        </tr>
        <tr>
            <td class="white"></td>
            <td class="blue" colspan="7"></td>
            <td class="white"></td>
        </tr>
        <tr>
            <td class="white"></td>
            <td class="white"></td>
            <td class="purple"></td>
            <td class="white"></td>
            <td class="purple"></td>
            <td class="white"></td>
            <td class="purple"></td>
            <td class="white"></td>
        </tr>
        <tr>
            <td class="white"></td>
            <td class="green" colspan="7"></td>
            <td class="white"></td>
        </tr>
        <tr>
            <td class="white"></td>
            <td class="purple" colspan="7"></td>
            <td class="white"></td>
        </tr>
        <tr>
            <td class="white" colspan="10"></td>
        </tr>     
    </table>

</body>
</html>
